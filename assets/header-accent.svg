<svg width="720" height="44" viewBox="0 0 720 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated header accent</title>
  <desc id="desc">A subtle animated divider line with moving nodes.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B8C3D1" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#B8C3D1" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#B8C3D1" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D7B46A"/>
      <stop offset="1" stop-color="#8FB3C9"/>
    </linearGradient>
  </defs>

  <path d="M28 22H692" stroke="url(#line)" stroke-width="2"/>

  <circle cx="172" cy="22" r="4.5" fill="url(#node)">
    <animate attributeName="cx" values="172;548;172" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="548" cy="22" r="4.5" fill="url(#node)" opacity="0.85">
    <animate attributeName="cx" values="548;172;548" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="22" r="3.5" fill="#DDE5EF" opacity="0.55">
    <animate attributeName="r" values="3.5;5;3.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
