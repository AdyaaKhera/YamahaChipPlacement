      <rect x="0" y="0" width="304" height="160" rx="18" fill="#0B1220" stroke="#FFFFFF" stroke-opacity="0.06"/>
      <g opacity="0.95">
        <circle cx="48" cy="32" r="13" fill="#D7B46A"/>
        <circle cx="104" cy="32" r="13" fill="#D7B46A"/>
        <circle cx="160" cy="32" r="13" fill="#D7B46A"/>
        <circle cx="216" cy="32" r="13" fill="#D7B46A"/>
        <circle cx="272" cy="32" r="13" fill="#D7B46A"/>
        <circle cx="48" cy="80" r="13" fill="#8FB3C9"/>
        <circle cx="104" cy="80" r="13" fill="#8FB3C9"/>
        <circle cx="160" cy="80" r="13" fill="#8FB3C9"/>
        <circle cx="216" cy="80" r="13" fill="#8FB3C9"/>
        <circle cx="272" cy="80" r="13" fill="#8FB3C9"/>
        <circle cx="48" cy="128" r="13" fill="#E3E8F0" opacity="0.86"/>
        <circle cx="104" cy="128" r="13" fill="#E3E8F0" opacity="0.86"/>
        <circle cx="160" cy="128" r="13" fill="#E3E8F0" opacity="0.86"/>
        <circle cx="216" cy="128" r="13" fill="#E3E8F0" opacity="0.86"/>
        <circle cx="272" cy="128" r="13" fill="#E3E8F0" opacity="0.86"/>
      </g>
      <circle cx="48" cy="32" r="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.12;0.34;0.12" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    </g>
  </g>

  <text x="110" y="448" fill="#EAF0F7" font-family="Arial, Helvetica, sans-serif" font-size="36" letter-spacing="0.5">Yamaha Final Project: Chip Placement with Yamaha SCARA</text>
  <text x="110" y="482" fill="#AFC1D3" font-family="Arial, Helvetica, sans-serif" font-size="18">Binary sensor detection, suction pickup, and a 3 x 5 placement routine.</text>
</svg>
