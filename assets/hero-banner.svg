<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yamaha Final Project Banner</title>
  <desc id="desc">Animated banner showing the Yamaha SCARA chip placement workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#121C2D"/>
      <stop offset="1" stop-color="#1A2435"/>
    </linearGradient>
    <linearGradient id="accent" x1="300" y1="120" x2="1320" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7B46A"/>
      <stop offset="1" stop-color="#8FB3C9"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="panel-left-clip">
      <rect x="85" y="120" width="420" height="280" rx="28"/>
    </clipPath>
    <clipPath id="panel-middle-clip">
      <rect x="590" y="120" width="420" height="280" rx="28"/>
    </clipPath>
    <clipPath id="panel-right-clip">
      <rect x="1095" y="120" width="420" height="280" rx="28"/>
    </clipPath>
  </defs>

  <rect width="1600" height="520" rx="32" fill="url(#bg)"/>
  <path d="M88 92H1510" stroke="url(#grid)" stroke-width="1" stroke-dasharray="10 18" opacity="0.65"/>
  <path d="M88 428H1510" stroke="url(#grid)" stroke-width="1" stroke-dasharray="10 18" opacity="0.35"/>
  <path d="M132 132C286 132 352 104 485 104C619 104 682 155 821 155C954 155 1032 121 1162 121C1295 121 1377 160 1484 160" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="85" y="120" width="420" height="280" rx="28" fill="#111B2B" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <rect x="85" y="120" width="420" height="48" rx="28" fill="#0E1624"/>
    <g clip-path="url(#panel-left-clip)">
    <circle cx="127" cy="152" r="7" fill="#D7B46A">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="151" cy="152" r="7" fill="#8FB3C9">
      <animate attributeName="opacity" values="1;0.45;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="152" r="7" fill="#E3E8F0" opacity="0.7"/>

    <text x="211" y="159" fill="#EAF0F7" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="2">YAMAHA SCARA</text>

    <g transform="translate(143 214)">
      <rect x="0" y="0" width="284" height="128" rx="20" fill="#0B1220" stroke="#FFFFFF" stroke-opacity="0.07"/>
      <path d="M24 24H260" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
      <path d="M24 56H260" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
      <path d="M24 88H260" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
      <g opacity="0.92">
        <rect x="40" y="30" width="28" height="28" rx="14" fill="#D7B46A"/>
        <rect x="40" y="62" width="28" height="28" rx="14" fill="#D7B46A" opacity="0.86"/>
        <rect x="40" y="94" width="28" height="28" rx="14" fill="#D7B46A" opacity="0.72"/>
      </g>
      <path d="M130 22C168 22 204 44 222 76" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="1 0"/>
      <circle cx="130" cy="22" r="12" fill="#8FB3C9" opacity="0.95">
        <animate attributeName="cy" values="22;18;22" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="222" cy="76" r="12" fill="#D7B46A">
        <animate attributeName="r" values="12;14;12" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="120" width="420" height="280" rx="28" fill="#101A29" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g clip-path="url(#panel-middle-clip)">
    <text x="634" y="168" fill="#EAF0F7" font-family="Arial, Helvetica, sans-serif" font-size="18" letter-spacing="3">PROCESS</text>
    <text x="634" y="208" fill="#AFC1D3" font-family="Arial, Helvetica, sans-serif" font-size="30">Detect</text>
    <text x="634" y="252" fill="#AFC1D3" font-family="Arial, Helvetica, sans-serif" font-size="30">Lift</text>
    <text x="634" y="296" fill="#AFC1D3" font-family="Arial, Helvetica, sans-serif" font-size="30">Place</text>
    <text x="634" y="340" fill="#AFC1D3" font-family="Arial, Helvetica, sans-serif" font-size="30">Repeat</text>
    <path d="M834 198C862 224 862 280 834 306" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="834" cy="198" r="10" fill="#8FB3C9"/>
    <circle cx="834" cy="306" r="10" fill="#D7B46A"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1095" y="120" width="420" height="280" rx="28" fill="#111B2B" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g clip-path="url(#panel-right-clip)">
    <text x="1137" y="196" fill="#EAF0F7" font-family="Arial, Helvetica, sans-serif" font-size="18" letter-spacing="3">TARGET GRID</text>
